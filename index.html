<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Executor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Syne:wght@400;600;700;800&display=swap');

  :root {
    --bg:        #0a0a0a;
    --surface:   #111111;
    --panel:     #181818;
    --border:    #2a2a2a;
    --border-hi: #3d3d3d;
    --tab-bg:    #141414;
    --tab-act:   #1e1e1e;
    --accent:    #e8e8e8;
    --muted:     #555555;
    --text:      #c8c8c8;
    --close:     #444444;
    --close-hv:  #cccccc;
    --plus:      #666666;
    --plus-hv:   #efefef;
    --glow:      rgba(255,255,255,0.04);
    --scrollbar: #2a2a2a;
    --scrollbar-hv: #444;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ── App Shell ── */
  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    animation: fadeIn 0.4s ease forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Top Bar ── */
  #topbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 16px;
    height: 44px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }

  #logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 13px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    user-select: none;
    padding-right: 14px;
    border-right: 1px solid var(--border);
  }

  #logo span {
    color: var(--muted);
    font-weight: 400;
  }

  /* ── Tabs Row ── */
  #tabs-row {
    display: flex;
    align-items: stretch;
    gap: 0;
    flex: 1;
    overflow-x: auto;
    overflow-y: hidden;
    scrollbar-width: none;
  }
  #tabs-row::-webkit-scrollbar { display: none; }

  .tab {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 0 14px;
    height: 100%;
    min-width: 100px;
    max-width: 180px;
    cursor: pointer;
    position: relative;
    font-size: 11.5px;
    color: var(--muted);
    border-right: 1px solid var(--border);
    background: transparent;
    transition: color 0.18s, background 0.18s;
    animation: tabSlideIn 0.22s cubic-bezier(0.22,1,0.36,1) forwards;
    flex-shrink: 0;
    user-select: none;
  }

  @keyframes tabSlideIn {
    from { opacity: 0; transform: translateX(-8px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .tab:hover { color: var(--text); background: var(--glow); }

  .tab.active {
    color: var(--accent);
    background: var(--tab-act);
  }

  .tab.active::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
    border-radius: 2px 2px 0 0;
    animation: lineIn 0.2s ease forwards;
  }

  @keyframes lineIn {
    from { transform: scaleX(0); }
    to   { transform: scaleX(1); }
  }

  .tab-icon {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
    transition: background 0.18s;
  }
  .tab.active .tab-icon { background: var(--accent); }
  .tab.modified .tab-icon { background: #8888ff; }

  .tab-name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 11.5px;
  }

  .tab-close {
    width: 16px; height: 16px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 4px;
    color: transparent;
    font-size: 12px;
    transition: color 0.14s, background 0.14s;
    flex-shrink: 0;
    line-height: 1;
  }
  .tab:hover .tab-close,
  .tab.active .tab-close { color: var(--close); }
  .tab-close:hover { color: var(--close-hv) !important; background: rgba(255,255,255,0.06); }

  /* new tab button */
  #btn-new-tab {
    display: flex; align-items: center; justify-content: center;
    width: 36px; min-width: 36px; height: 100%;
    cursor: pointer;
    color: var(--plus);
    font-size: 18px;
    transition: color 0.16s, background 0.16s;
    border-right: 1px solid var(--border);
    flex-shrink: 0;
    user-select: none;
  }
  #btn-new-tab:hover { color: var(--plus-hv); background: var(--glow); }

  /* ── Editor Wrapper ── */
  #editor-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  #monaco-container {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.22s ease;
  }
  #monaco-container.visible { opacity: 1; }

  /* ── Status Bar ── */
  #statusbar {
    height: 24px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 16px;
    font-size: 10.5px;
    color: var(--muted);
    flex-shrink: 0;
    user-select: none;
  }
  #statusbar span { display: flex; align-items: center; gap: 5px; }
  #statusbar .dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: #5a9e6f; display: inline-block;
  }
  #status-pos { margin-left: auto; }

  /* ── Scrollbar override ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-hv); }

  /* ── Empty state ── */
  #empty-state {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px;
    color: var(--muted);
    font-size: 12px;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  #empty-state .big { font-size: 48px; opacity: 0.12; }
  #empty-state.hidden { opacity: 0; }

  /* tab rename input */
  .tab-name-input {
    background: transparent;
    border: none;
    outline: none;
    color: var(--accent);
    font-family: inherit;
    font-size: 11.5px;
    width: 100%;
    caret-color: var(--accent);
  }
</style>
</head>
<body>

<div id="app">

  <!-- Top Bar -->
  <div id="topbar">
    <div id="logo"><span>Editor</span></div>
    <div id="tabs-row"></div>
    <div id="btn-new-tab" title="Nova aba (Ctrl+T)">+</div>
  </div>

  <!-- Editor -->
  <div id="editor-wrap">
    <div id="empty-state">
      <div class="big">{ }</div>
      <div>Ctrl+T para criar uma nova aba</div>
    </div>
    <div id="monaco-container"></div>
  </div>

  <!-- Status Bar -->
  <div id="statusbar">
    <span><span class="dot"></span> Lua 5.4</span>
    <span id="status-tab-name">—</span>
    <span id="status-pos" style="margin-left:auto">Ln 1, Col 1</span>
  </div>

</div>

<!-- Monaco Loader -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
<script>
(function() {

  /* ── State ── */
  let tabs       = [];   // { id, name, model, viewState }
  let activeId   = null;
  let editor     = null;
  let tabCounter = 0;
  let monacoReady = false;

  /* ── DOM refs ── */
  const tabsRow    = document.getElementById('tabs-row');
  const btnNew     = document.getElementById('btn-new-tab');
  const monacoEl   = document.getElementById('monaco-container');
  const emptyState = document.getElementById('empty-state');
  const statusTab  = document.getElementById('status-tab-name');
  const statusPos  = document.getElementById('status-pos');

  /* ── Monaco bootstrap ── */
  require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' } });

  require(['vs/editor/editor.main'], function(monaco) {
    monacoReady = true;
    setupMonaco(monaco);
  });

  function setupMonaco(monaco) {
    /* ── Custom dark theme ── */
    monaco.editor.defineTheme('executor-dark', {
      base: 'vs-dark',
      inherit: true,
      rules: [
        { token: '',               foreground: 'c8c8c8', background: '111111' },
        { token: 'comment',        foreground: '4a4a4a', fontStyle: 'italic' },
        { token: 'keyword',        foreground: 'a0a8c8' },
        { token: 'string',         foreground: '8eb48e' },
        { token: 'number',         foreground: 'b5a0d8' },
        { token: 'operator',       foreground: '888888' },
        { token: 'identifier',     foreground: 'd4d4d4' },
        { token: 'delimiter',      foreground: '666666' },
        { token: 'type',           foreground: '9ab5c8' },
        { token: 'function',       foreground: 'c8b88e' },
        { token: 'variable',       foreground: 'e0d8c8' },
        { token: 'constant',       foreground: 'b5a0d8' },
      ],
      colors: {
        'editor.background':              '#111111',
        'editor.foreground':              '#c8c8c8',
        'editor.lineHighlightBackground': '#171717',
        'editor.selectionBackground':     '#2a2a3a',
        'editor.inactiveSelectionBackground': '#1e1e26',
        'editorCursor.foreground':        '#e8e8e8',
        'editorLineNumber.foreground':    '#333333',
        'editorLineNumber.activeForeground': '#666666',
        'editorIndentGuide.background':   '#1f1f1f',
        'editorIndentGuide.activeBackground': '#333333',
        'editorWidget.background':        '#161616',
        'editorWidget.border':            '#2a2a2a',
        'editorSuggestWidget.background': '#161616',
        'editorSuggestWidget.border':     '#2a2a2a',
        'editorSuggestWidget.selectedBackground': '#222222',
        'editorSuggestWidget.highlightForeground': '#e8e8e8',
        'input.background':               '#1a1a1a',
        'input.border':                   '#2a2a2a',
        'list.hoverBackground':           '#1e1e1e',
        'list.activeSelectionBackground': '#252525',
        'scrollbarSlider.background':     '#2a2a2a88',
        'scrollbarSlider.hoverBackground':'#44444488',
        'scrollbarSlider.activeBackground':'#55555588',
        'editorGutter.background':        '#111111',
        'minimap.background':             '#0f0f0f',
      }
    });

    /* ── Lua language extras ── */
    registerLuaExtras(monaco);

    /* ── Create editor instance ── */
    editor = monaco.editor.create(monacoEl, {
      language: 'lua',
      theme: 'executor-dark',
      fontSize: 13.5,
      fontFamily: "'JetBrains Mono', 'Fira Code', monospace",
      fontLigatures: true,
      lineHeight: 22,
      letterSpacing: 0.3,
      minimap: { enabled: true, scale: 1, side: 'right', renderCharacters: false },
      scrollBeyondLastLine: false,
      wordWrap: 'off',
      tabSize: 4,
      insertSpaces: true,
      cursorBlinking: 'smooth',
      cursorSmoothCaretAnimation: 'on',
      smoothScrolling: true,
      renderWhitespace: 'none',
      renderLineHighlight: 'gutter',
      occurrencesHighlight: 'off',
      selectionHighlight: false,
      overviewRulerBorder: false,
      overviewRulerLanes: 0,
      hideCursorInOverviewRuler: true,
      scrollbar: {
        verticalScrollbarSize: 6,
        horizontalScrollbarSize: 6,
        useShadows: false,
      },
      padding: { top: 14, bottom: 14 },
      lineNumbersMinChars: 3,
      suggest: {
        showIcons: true,
        showStatusBar: false,
        preview: true,
        insertMode: 'replace',
      },
      quickSuggestions: { other: true, comments: false, strings: true },
      parameterHints: { enabled: true },
      folding: true,
      foldingHighlight: false,
      bracketPairColorization: { enabled: false },
      guides: { bracketPairs: false, indentation: true },
      contextmenu: true,
      mouseWheelZoom: false,
      readOnly: false,
    });

    /* cursor position → status bar */
    editor.onDidChangeCursorPosition(e => {
      statusPos.textContent = `Ln ${e.position.lineNumber}, Col ${e.position.column}`;
    });

    /* mark tab modified on content change */
    editor.onDidChangeModelContent(() => {
      const tab = tabs.find(t => t.id === activeId);
      if (tab) {
        tab.dirty = true;
        renderTabs();
      }
    });

    /* resize */
    new ResizeObserver(() => editor && editor.layout()).observe(monacoEl);

    /* keyboard shortcuts */
    window.addEventListener('keydown', e => {
      if (e.ctrlKey && e.key === 't') { e.preventDefault(); createTab(); }
      if (e.ctrlKey && e.key === 'w') { e.preventDefault(); closeActiveTab(); }
    });

    /* if tabs already queued before editor ready (shouldn't happen but safe) */
    if (tabs.length === 0) createTab();
  }

  /* ── Lua intellisense extras ── */
  function registerLuaExtras(monaco) {
    const LUA_GLOBALS = [
      // Standard
      'print','tostring','tonumber','type','pairs','ipairs','next',
      'select','unpack','rawget','rawset','rawequal','rawlen',
      'setmetatable','getmetatable','pcall','xpcall','error',
      'assert','require','load','loadfile','dofile','collectgarbage',
      'gcinfo','newproxy','module','package','coroutine','debug',
      'io','os','string','table','math','utf8','bit32',
      // Common libs
      'string.format','string.sub','string.len','string.rep',
      'string.reverse','string.upper','string.lower','string.byte',
      'string.char','string.find','string.match','string.gmatch',
      'string.gsub','string.dump',
      'table.insert','table.remove','table.sort','table.concat',
      'table.unpack','table.move',
      'math.abs','math.ceil','math.floor','math.sqrt','math.max',
      'math.min','math.random','math.randomseed','math.pi','math.huge',
      'math.sin','math.cos','math.tan','math.log','math.exp',
      'os.clock','os.time','os.date','os.exit','os.getenv',
      'io.read','io.write','io.open','io.close','io.lines',
      'coroutine.create','coroutine.resume','coroutine.yield',
      'coroutine.status','coroutine.wrap','coroutine.isyieldable',
    ];

    const LUA_SNIPPETS = [
      { label: 'if',       insert: 'if ${1:condition} then\n\t${2:-- body}\nend' },
      { label: 'ifelse',   insert: 'if ${1:condition} then\n\t${2:-- body}\nelse\n\t${3:-- else}\nend' },
      { label: 'for',      insert: 'for ${1:i} = ${2:1}, ${3:10} do\n\t${4:-- body}\nend' },
      { label: 'fori',     insert: 'for ${1:i}, ${2:v} in ipairs(${3:t}) do\n\t${4:-- body}\nend' },
      { label: 'forp',     insert: 'for ${1:k}, ${2:v} in pairs(${3:t}) do\n\t${4:-- body}\nend' },
      { label: 'while',    insert: 'while ${1:condition} do\n\t${2:-- body}\nend' },
      { label: 'repeat',   insert: 'repeat\n\t${1:-- body}\nuntil ${2:condition}' },
      { label: 'function', insert: 'function ${1:name}(${2:args})\n\t${3:-- body}\nend' },
      { label: 'local',    insert: 'local ${1:name} = ${2:value}' },
      { label: 'localfn',  insert: 'local function ${1:name}(${2:args})\n\t${3:-- body}\nend' },
      { label: 'pcall',    insert: 'local ok, err = pcall(function()\n\t${1:-- body}\nend)\nif not ok then\n\tprint(err)\nend' },
      { label: 'class',    insert: 'local ${1:ClassName} = {}\n${1:ClassName}.__index = ${1:ClassName}\n\nfunction ${1:ClassName}.new(${2:args})\n\tlocal self = setmetatable({}, ${1:ClassName})\n\t${3:-- init}\n\treturn self\nend\n\nreturn ${1:ClassName}' },
      { label: 'module',   insert: 'local M = {}\n\n${1:-- module body}\n\nreturn M' },
      { label: 'try',      insert: 'local status, err = xpcall(function()\n\t${1:-- body}\nend, debug.traceback)\nif not status then\n\tprint("Error:", err)\nend' },
    ];

    monaco.languages.registerCompletionItemProvider('lua', {
      triggerCharacters: ['.', ':', '"', "'"],
      provideCompletionItems(model, position) {
        const word = model.getWordUntilPosition(position);
        const range = {
          startLineNumber: position.lineNumber,
          endLineNumber:   position.lineNumber,
          startColumn:     word.startColumn,
          endColumn:       word.endColumn,
        };

        const globalItems = LUA_GLOBALS.map(g => ({
          label: g,
          kind: monaco.languages.CompletionItemKind.Function,
          insertText: g,
          range,
          detail: 'Lua built-in',
        }));

        const snippetItems = LUA_SNIPPETS.map(s => ({
          label: s.label,
          kind: monaco.languages.CompletionItemKind.Snippet,
          insertText: s.insert,
          insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
          range,
          detail: 'snippet',
          documentation: { value: '```lua\n' + s.insert + '\n```' },
        }));

        return { suggestions: [...globalItems, ...snippetItems] };
      }
    });

    /* hover docs for common globals */
    const HOVER_DOCS = {
      'print':        '**print**(...)\n\nPrints values to stdout.',
      'pairs':        '**pairs**(t)\n\nIterates over all key-value pairs in table `t`.',
      'ipairs':       '**ipairs**(t)\n\nIterates over array portion of table `t` (index, value).',
      'tostring':     '**tostring**(v)\n\nConverts value `v` to string.',
      'tonumber':     '**tonumber**(e [, base])\n\nConverts `e` to number.',
      'type':         '**type**(v)\n\nReturns the type name of `v` as a string.',
      'setmetatable': '**setmetatable**(table, metatable)\n\nSets the metatable for the given table.',
      'getmetatable': '**getmetatable**(object)\n\nReturns the metatable of the given object.',
      'pcall':        '**pcall**(f, ...)\n\nCalls `f` in protected mode; returns status + results.',
      'xpcall':       '**xpcall**(f, msgh, ...)\n\nCalls `f` in protected mode with error handler.',
      'require':      '**require**(modname)\n\nLoads the given module.',
      'rawget':       '**rawget**(table, index)\n\nGets table value without invoking `__index`.',
      'rawset':       '**rawset**(table, index, value)\n\nSets table value without invoking `__newindex`.',
      'error':        '**error**(message [, level])\n\nRaises an error with the given message.',
      'assert':       '**assert**(v [, message])\n\nRaises error if `v` is false or nil.',
      'select':       '**select**(index, ...)\n\nReturns all arguments from index.',
      'unpack':       '**unpack**(list [, i [, j]])\n\nReturns elements from table as values.',
      'collectgarbage': '**collectgarbage**([opt [, arg]])\n\nControls the garbage collector.',
    };

    monaco.languages.registerHoverProvider('lua', {
      provideHover(model, position) {
        const word = model.getWordAtPosition(position);
        if (!word) return null;
        const doc = HOVER_DOCS[word.word];
        if (!doc) return null;
        return {
          contents: [{ value: doc }],
          range: {
            startLineNumber: position.lineNumber, endLineNumber: position.lineNumber,
            startColumn: word.startColumn, endColumn: word.endColumn,
          }
        };
      }
    });

    /* basic signature help for print/pcall */
    monaco.languages.registerSignatureHelpProvider('lua', {
      signatureHelpTriggerCharacters: ['(', ','],
      provideSignatureHelp(model, position) {
        const line = model.getLineContent(position.lineNumber).substring(0, position.column);
        const match = line.match(/(\w+)\s*\(([^)]*)$/);
        if (!match) return null;
        const fn = match[1];
        const SIGS = {
          print:  { label: 'print(...)',              params: ['...'] },
          pairs:  { label: 'pairs(t)',                params: ['t: table'] },
          ipairs: { label: 'ipairs(t)',               params: ['t: table'] },
          type:   { label: 'type(v)',                 params: ['v: any'] },
          pcall:  { label: 'pcall(f, ...)',           params: ['f: function', '...'] },
          error:  { label: 'error(message, level?)',  params: ['message', 'level?'] },
          tostring: { label: 'tostring(v)',           params: ['v: any'] },
          tonumber: { label: 'tonumber(e, base?)',    params: ['e', 'base?: number'] },
          setmetatable: { label: 'setmetatable(table, metatable)', params: ['table', 'metatable'] },
          require: { label: 'require(modname)',       params: ['modname: string'] },
        };
        const sig = SIGS[fn];
        if (!sig) return null;
        const commas = (match[2].match(/,/g) || []).length;
        return {
          value: {
            signatures: [{
              label: sig.label,
              parameters: sig.params.map(p => ({ label: p })),
              activeParameter: Math.min(commas, sig.params.length - 1),
            }],
            activeSignature: 0,
            activeParameter: Math.min(commas, sig.params.length - 1),
          },
          dispose() {}
        };
      }
    });
  }

  /* ── Tab management ── */
  function createTab(name) {
    const id   = ++tabCounter;
    const label = name || `Script ${id}`;

    let model = null;
    if (window.monaco) {
      model = window.monaco.editor.createModel('', 'lua');
    }

    const tab = { id, name: label, model, viewState: null, dirty: false };
    tabs.push(tab);
    renderTabs();
    activateTab(id);
    return tab;
  }

  function closeTab(id, e) {
    if (e) e.stopPropagation();
    const idx = tabs.findIndex(t => t.id === id);
    if (idx === -1) return;
    const tab = tabs[idx];
    if (tab.model) tab.model.dispose();
    tabs.splice(idx, 1);

    if (tabs.length === 0) {
      activeId = null;
      if (editor) editor.setModel(null);
      monacoEl.classList.remove('visible');
      emptyState.classList.remove('hidden');
      statusTab.textContent = '—';
    } else {
      const next = tabs[Math.min(idx, tabs.length - 1)];
      activateTab(next.id);
    }
    renderTabs();
  }

  function closeActiveTab() { if (activeId !== null) closeTab(activeId); }

  function activateTab(id) {
    if (!editor) return;

    /* save current state */
    if (activeId !== null) {
      const prev = tabs.find(t => t.id === activeId);
      if (prev) prev.viewState = editor.saveViewState();
    }

    activeId = id;
    const tab = tabs.find(t => t.id === id);
    if (!tab) return;

    /* if model wasn't created yet (editor wasn't ready) */
    if (!tab.model) {
      tab.model = window.monaco.editor.createModel('', 'lua');
    }

    editor.setModel(tab.model);
    if (tab.viewState) editor.restoreViewState(tab.viewState);
    editor.focus();

    /* mark clean on switch */
    tab.dirty = false;
    renderTabs();

    monacoEl.classList.add('visible');
    emptyState.classList.add('hidden');
    statusTab.textContent = tab.name;
  }

  function renderTabs() {
    tabsRow.innerHTML = '';
    tabs.forEach(tab => {
      const el = document.createElement('div');
      el.className = 'tab' + (tab.id === activeId ? ' active' : '') + (tab.dirty ? ' modified' : '');
      el.dataset.id = tab.id;

      el.innerHTML = `
        <span class="tab-icon"></span>
        <span class="tab-name">${escHtml(tab.name)}</span>
        <span class="tab-close" title="Fechar">×</span>
      `;

      /* activate on click */
      el.addEventListener('click', () => activateTab(tab.id));

      /* rename on dblclick */
      el.addEventListener('dblclick', () => startRename(tab, el));

      /* close button */
      el.querySelector('.tab-close').addEventListener('click', e => closeTab(tab.id, e));

      tabsRow.appendChild(el);
    });
  }

  function startRename(tab, el) {
    const nameEl = el.querySelector('.tab-name');
    const input  = document.createElement('input');
    input.className = 'tab-name-input';
    input.value = tab.name;
    nameEl.replaceWith(input);
    input.select();

    const finish = () => {
      const v = input.value.trim();
      if (v) { tab.name = v; statusTab.textContent = v; }
      renderTabs();
    };
    input.addEventListener('blur', finish);
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter')  { e.preventDefault(); input.blur(); }
      if (e.key === 'Escape') { tab.name = tab.name; input.blur(); }
    });
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ── Wiring ── */
  btnNew.addEventListener('click', () => createTab());

  /* expose monaco globally so createTab called before ready still works */
  const _require = window.require;
  require(['vs/editor/editor.main'], function(m) {
    window.monaco = m;
    /* create first tab after editor ready */
    createTab('Script 1');
  });

})();
</script>
</body>
