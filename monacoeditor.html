<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>Stegma Executor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Syne:wght@400;600;700;800&display=swap');

  :root {
    --bg:        #0a0a0a;
    --surface:   #111111;
    --border:    #2a2a2a;
    --tab-act:   #1e1e1e;
    --accent:    #e8e8e8;
    --muted:     #555555;
    --text:      #c8c8c8;
    --close-hv:  #cccccc;
    --plus:      #666666;
    --plus-hv:   #efefef;
    --glow:      rgba(255,255,255,0.04);
    --scrollbar: #2a2a2a;
    --scrollbar-hv: #444;
    --col-ok:    #5a9e6f;
    --col-err:   #9e5a5a;
    --col-warn:  #9e8a5a;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%; width: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    user-select: none;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    animation: fadeIn 0.35s ease forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(5px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  #topbar {
    display: flex;
    align-items: center;
    padding: 0 14px;
    height: 42px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    gap: 10px;
    z-index: 10;
  }

  #logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 12px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent);
    padding-right: 14px;
    border-right: 1px solid var(--border);
    white-space: nowrap;
    flex-shrink: 0;
  }
  #logo span { color: var(--muted); font-weight: 400; }

  #attach-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    letter-spacing: 0.07em;
    padding: 3px 10px;
    border: 1px solid var(--border);
    border-radius: 20px;
    flex-shrink: 0;
    transition: border-color 0.4s, color 0.4s;
    color: var(--muted);
  }
  #attach-pill.attached  { border-color: var(--col-ok);   color: var(--col-ok); }
  #attach-pill.detached  { border-color: var(--col-err);  color: var(--col-err); }
  #attach-pill.attaching { border-color: var(--col-warn); color: var(--col-warn); animation: blink 1s ease infinite; }

  @keyframes blink {
    0%,100% { opacity: 1; }
    50%      { opacity: 0.3; }
  }

  .pill-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: currentColor; flex-shrink: 0;
    transition: box-shadow 0.4s;
  }
  #attach-pill.attached .pill-dot { box-shadow: 0 0 6px var(--col-ok); }

  #tabs-row {
    display: flex; align-items: stretch;
    flex: 1; overflow-x: auto; overflow-y: hidden;
    scrollbar-width: none; min-width: 0;
  }
  #tabs-row::-webkit-scrollbar { display: none; }

  .tab {
    display: flex; align-items: center; gap: 7px;
    padding: 0 14px; height: 100%;
    min-width: 100px; max-width: 180px;
    cursor: pointer; position: relative;
    font-size: 11px; color: var(--muted);
    border-right: 1px solid var(--border);
    background: transparent;
    transition: color 0.15s, background 0.15s;
    animation: tabIn 0.2s cubic-bezier(0.22,1,0.36,1) forwards;
    flex-shrink: 0;
  }
  @keyframes tabIn {
    from { opacity: 0; transform: translateX(-6px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  .tab:hover { color: var(--text); background: var(--glow); }
  .tab.active { color: var(--accent); background: var(--tab-act); }
  .tab.active::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 2px; background: var(--accent);
    border-radius: 2px 2px 0 0;
    animation: lineIn 0.18s ease forwards;
  }
  @keyframes lineIn {
    from { transform: scaleX(0); }
    to   { transform: scaleX(1); }
  }

  .tab-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--muted); flex-shrink: 0;
    transition: background 0.15s;
  }
  .tab.active .tab-dot { background: var(--accent); }
  .tab.dirty  .tab-dot { background: #8888ee; }

  .tab-label {
    flex: 1; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap;
    font-size: 11px;
  }

  .tab-close {
    width: 16px; height: 16px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 3px; color: transparent;
    font-size: 14px; line-height: 1;
    transition: color 0.12s, background 0.12s; flex-shrink: 0;
  }
  .tab:hover .tab-close,
  .tab.active .tab-close { color: #555; }
  .tab-close:hover { color: var(--close-hv) !important; background: rgba(255,255,255,0.07); }

  #btn-new {
    display: flex; align-items: center; justify-content: center;
    width: 36px; min-width: 36px; height: 100%;
    cursor: pointer; color: var(--plus); font-size: 20px;
    transition: color 0.15s, background 0.15s;
    border-right: 1px solid var(--border); flex-shrink: 0;
  }
  #btn-new:hover { color: var(--plus-hv); background: var(--glow); }

  #editor-wrap { flex: 1; position: relative; overflow: hidden; }

  #monaco-container {
    position: absolute; inset: 0;
    opacity: 0; transition: opacity 0.2s ease;
  }
  #monaco-container.visible { opacity: 1; }

  #empty-state {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 10px; color: var(--muted); font-size: 11px;
    pointer-events: none; transition: opacity 0.3s;
  }
  #empty-state .big { font-size: 44px; opacity: 0.1; }
  #empty-state.hidden { opacity: 0; }

  #statusbar {
    height: 22px; background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 14px; gap: 14px;
    font-size: 10px; color: var(--muted); flex-shrink: 0;
  }
  .sb-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--col-ok); display: inline-block; margin-right: 4px;
  }
  #sb-pos { margin-left: auto; }

  #toast {
    position: fixed; bottom: 32px; right: 14px;
    background: #1e1e1e; border: 1px solid var(--border);
    border-radius: 6px; padding: 8px 14px;
    font-size: 11px; color: var(--text);
    opacity: 0; transform: translateY(6px);
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none; z-index: 100; max-width: 260px;
  }
  #toast.show { opacity: 1; transform: translateY(0); }
  #toast.ok   { border-color: var(--col-ok);   color: var(--col-ok); }
  #toast.err  { border-color: var(--col-err);  color: var(--col-err); }
  #toast.warn { border-color: var(--col-warn); color: var(--col-warn); }

  .tab-name-input {
    background: transparent; border: none; outline: none;
    color: var(--accent); font-family: inherit; font-size: 11px;
    width: 100%; caret-color: var(--accent);
  }

  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-hv); }
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div id="logo">STEGMA<span>exec</span></div>
    <div id="attach-pill" class="detached">
      <span class="pill-dot"></span>
      <span id="pill-label">DISCONNECTED</span>
    </div>
    <div id="tabs-row"></div>
    <div id="btn-new" title="Nova aba (Ctrl+T)">+</div>
  </div>

  <div id="editor-wrap">
    <div id="empty-state">
      <div class="big">{ }</div>
      <div>Ctrl+T para nova aba</div>
    </div>
    <div id="monaco-container"></div>
  </div>

  <div id="statusbar">
    <span><span class="sb-dot"></span>Lua 5.4</span>
    <span id="sb-tab">—</span>
    <span id="sb-pos">Ln 1, Col 1</span>
  </div>
</div>

<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
<script>
(function () {
  'use strict';

  let tabs = [], activeId = null, editor = null, tabCounter = 0;

  const monacoEl   = document.getElementById('monaco-container');
  const emptyState = document.getElementById('empty-state');
  const tabsRow    = document.getElementById('tabs-row');
  const btnNew     = document.getElementById('btn-new');
  const sbTab      = document.getElementById('sb-tab');
  const sbPos      = document.getElementById('sb-pos');
  const pill       = document.getElementById('attach-pill');
  const pillLabel  = document.getElementById('pill-label');
  const toastEl    = document.getElementById('toast');

  /* ─── WebView2 Bridge (C# calls these via ExecuteScriptAsync) ─── */
  window.stegma = {

    /* Called by C# to get active script */
    getScript() {
      return editor ? editor.getValue() : '';
    },

    /* Called by C# to inject/load script content */
    setScript(code) {
      if (!editor) return;
      editor.setValue(code || '');
      editor.setScrollTop(0);
    },

    /* Called by C# to wipe active tab content */
    clearScript() {
      if (editor) editor.setValue('');
    },

    /* Called by C# to create a new tab (e.g. on File > Open) */
    newTab(name, content) {
      const tab = createTab(name || undefined);
      if (content && editor) editor.setValue(content);
      return tab.id;
    },

    /* Called by C# to update the attach status pill */
    setAttachStatus(status) {
      // status: 'attaching' | 'attached' | 'detached'
      pill.className = status;
      pillLabel.textContent = {
        attaching: 'CONNECTING\u2026',
        attached:  'ATTACHED',
        detached:  'DISCONNECTED',
      }[status] || status.toUpperCase();
    },

    /* Called by C# to show a floating toast */
    showToast(message, type) {
      // type: 'ok' | 'err' | 'warn'
      toastEl.textContent = message;
      toastEl.className = 'show ' + (type || '');
      clearTimeout(window._toastTimer);
      window._toastTimer = setTimeout(() => { toastEl.className = ''; }, 3200);
    },
  };

  /* Send messages TO C# (received via WebMessageReceived event) */
  function postHost(type, payload) {
    if (window.chrome && window.chrome.webview)
      window.chrome.webview.postMessage(JSON.stringify({ type, payload }));
  }

  /* ─── Monaco Bootstrap ─── */
  require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' } });
  require(['vs/editor/editor.main'], function (monaco) {
    window.monaco = monaco;
    defineTheme(monaco);
    registerLua(monaco);

    editor = monaco.editor.create(monacoEl, {
      language: 'lua', theme: 'stegma-dark',
      fontSize: 13.5,
      fontFamily: "'JetBrains Mono', 'Fira Code', monospace",
      fontLigatures: true, lineHeight: 22, letterSpacing: 0.3,
      minimap: { enabled: true, scale: 1, renderCharacters: false },
      scrollBeyondLastLine: false, wordWrap: 'off', tabSize: 4,
      insertSpaces: true, cursorBlinking: 'smooth',
      cursorSmoothCaretAnimation: 'on', smoothScrolling: true,
      renderWhitespace: 'none', renderLineHighlight: 'gutter',
      occurrencesHighlight: 'off', selectionHighlight: false,
      overviewRulerBorder: false, overviewRulerLanes: 0,
      scrollbar: { verticalScrollbarSize: 5, horizontalScrollbarSize: 5, useShadows: false },
      padding: { top: 14, bottom: 14 }, lineNumbersMinChars: 3,
      suggest: { showIcons: true, preview: true, insertMode: 'replace' },
      quickSuggestions: { other: true, comments: false, strings: true },
      parameterHints: { enabled: true }, folding: true,
      foldingHighlight: false,
      bracketPairColorization: { enabled: false },
      guides: { bracketPairs: false, indentation: true },
      contextmenu: true,
    });

    editor.onDidChangeCursorPosition(e => {
      sbPos.textContent = `Ln ${e.position.lineNumber}, Col ${e.position.column}`;
    });

    editor.onDidChangeModelContent(() => {
      const tab = tabs.find(t => t.id === activeId);
      if (tab && !tab.dirty) { tab.dirty = true; renderTabs(); }
      postHost('contentChanged', { tabId: activeId });
    });

    /* Ctrl+Enter → trigger Execute from inside editor */
    editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.Enter, () => {
      postHost('executeRequest', { script: editor.getValue() });
    });

    new ResizeObserver(() => editor && editor.layout()).observe(monacoEl);
    createTab('Script 1');
  });

  /* ─── Theme ─── */
  function defineTheme(monaco) {
    monaco.editor.defineTheme('stegma-dark', {
      base: 'vs-dark', inherit: true,
      rules: [
        { token: '',          foreground: 'c8c8c8', background: '111111' },
        { token: 'comment',   foreground: '3a3a3a', fontStyle: 'italic' },
        { token: 'keyword',   foreground: 'a0a8c8' },
        { token: 'string',    foreground: '8eb48e' },
        { token: 'number',    foreground: 'b5a0d8' },
        { token: 'operator',  foreground: '666666' },
        { token: 'identifier',foreground: 'd0d0d0' },
        { token: 'delimiter', foreground: '555555' },
        { token: 'function',  foreground: 'c8b88e' },
        { token: 'type',      foreground: '9ab5c8' },
      ],
      colors: {
        'editor.background':                '#111111',
        'editor.foreground':                '#c8c8c8',
        'editor.lineHighlightBackground':   '#171717',
        'editor.selectionBackground':       '#2a2a3a',
        'editorCursor.foreground':          '#e8e8e8',
        'editorLineNumber.foreground':      '#2e2e2e',
        'editorLineNumber.activeForeground':'#555555',
        'editorWidget.background':          '#161616',
        'editorWidget.border':              '#2a2a2a',
        'editorSuggestWidget.background':   '#161616',
        'editorSuggestWidget.border':       '#2a2a2a',
        'editorSuggestWidget.selectedBackground': '#222222',
        'editorSuggestWidget.highlightForeground': '#e8e8e8',
        'input.background':                 '#1a1a1a',
        'input.border':                     '#2a2a2a',
        'list.hoverBackground':             '#1e1e1e',
        'list.activeSelectionBackground':   '#252525',
        'scrollbarSlider.background':       '#2a2a2a88',
        'scrollbarSlider.hoverBackground':  '#44444488',
        'minimap.background':               '#0f0f0f',
        'editorGutter.background':          '#111111',
      }
    });
  }

  /* ─── Lua Intellisense ─── */
  function registerLua(monaco) {
    const GLOBALS = [
      'print','tostring','tonumber','type','pairs','ipairs','next','select',
      'unpack','rawget','rawset','rawequal','rawlen','setmetatable','getmetatable',
      'pcall','xpcall','error','assert','require','load','loadfile','dofile',
      'collectgarbage','coroutine','debug','io','os','string','table','math','utf8',
      'string.format','string.sub','string.len','string.rep','string.reverse',
      'string.upper','string.lower','string.byte','string.char','string.find',
      'string.match','string.gmatch','string.gsub',
      'table.insert','table.remove','table.sort','table.concat','table.unpack','table.move',
      'math.abs','math.ceil','math.floor','math.sqrt','math.max','math.min',
      'math.random','math.randomseed','math.pi','math.huge','math.sin','math.cos','math.tan',
      'math.log','math.exp','os.clock','os.time','os.date','os.exit','os.getenv',
      'io.read','io.write','io.open','io.close','io.lines',
      'coroutine.create','coroutine.resume','coroutine.yield',
      'coroutine.status','coroutine.wrap','coroutine.isyieldable',
    ];

    const SNIPPETS = [
      { label:'if',       insert:'if ${1:cond} then\n\t${2}\nend' },
      { label:'ifelse',   insert:'if ${1:cond} then\n\t${2}\nelse\n\t${3}\nend' },
      { label:'for',      insert:'for ${1:i} = ${2:1}, ${3:10} do\n\t${4}\nend' },
      { label:'fori',     insert:'for ${1:i}, ${2:v} in ipairs(${3:t}) do\n\t${4}\nend' },
      { label:'forp',     insert:'for ${1:k}, ${2:v} in pairs(${3:t}) do\n\t${4}\nend' },
      { label:'while',    insert:'while ${1:cond} do\n\t${2}\nend' },
      { label:'repeat',   insert:'repeat\n\t${1}\nuntil ${2:cond}' },
      { label:'function', insert:'function ${1:name}(${2})\n\t${3}\nend' },
      { label:'local',    insert:'local ${1:name} = ${2:value}' },
      { label:'localfn',  insert:'local function ${1:name}(${2})\n\t${3}\nend' },
      { label:'pcall',    insert:'local ok, err = pcall(function()\n\t${1}\nend)\nif not ok then print(err) end' },
      { label:'class',    insert:'local ${1:Class} = {}\n${1:Class}.__index = ${1:Class}\n\nfunction ${1:Class}.new(${2})\n\tlocal self = setmetatable({}, ${1:Class})\n\t${3}\n\treturn self\nend\n\nreturn ${1:Class}' },
      { label:'module',   insert:'local M = {}\n\n${1}\n\nreturn M' },
      { label:'try',      insert:'local ok, err = xpcall(function()\n\t${1}\nend, debug.traceback)\nif not ok then print("Error:", err) end' },
    ];

    monaco.languages.registerCompletionItemProvider('lua', {
      triggerCharacters: ['.', ':'],
      provideCompletionItems(model, position) {
        const w = model.getWordUntilPosition(position);
        const range = { startLineNumber: position.lineNumber, endLineNumber: position.lineNumber,
                        startColumn: w.startColumn, endColumn: w.endColumn };
        return { suggestions: [
          ...GLOBALS.map(g => ({ label: g, kind: monaco.languages.CompletionItemKind.Function,
            insertText: g, range, detail: 'Lua built-in' })),
          ...SNIPPETS.map(s => ({ label: s.label, kind: monaco.languages.CompletionItemKind.Snippet,
            insertText: s.insert,
            insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
            range, detail: 'snippet', documentation: { value: '```lua\n' + s.insert + '\n```' } })),
        ]};
      }
    });

    const HOVER = {
      print:'**print**(...)\n\nPrints values to stdout.',
      pairs:'**pairs**(t)\n\nIterates all key-value pairs.',
      ipairs:'**ipairs**(t)\n\nIterates array part (index, value).',
      tostring:'**tostring**(v)\n\nConverts to string.',
      tonumber:'**tonumber**(e [, base])\n\nConverts to number.',
      type:'**type**(v)\n\nReturns type name.',
      pcall:'**pcall**(f, ...)\n\nProtected call. Returns ok, result.',
      xpcall:'**xpcall**(f, msgh, ...)\n\nProtected call with error handler.',
      error:'**error**(msg [, level])\n\nRaises an error.',
      assert:'**assert**(v [, msg])\n\nErrors if v is false/nil.',
      require:'**require**(modname)\n\nLoads a module.',
      setmetatable:'**setmetatable**(t, mt)\n\nSets metatable.',
      getmetatable:'**getmetatable**(obj)\n\nReturns metatable.',
      rawget:'**rawget**(t, k)\n\nGets without __index.',
      rawset:'**rawset**(t, k, v)\n\nSets without __newindex.',
      select:'**select**(index, ...)\n\nReturns args from index.',
      unpack:'**unpack**(t [, i, j])\n\nReturns table elements.',
    };

    monaco.languages.registerHoverProvider('lua', {
      provideHover(model, pos) {
        const w = model.getWordAtPosition(pos);
        if (!w || !HOVER[w.word]) return null;
        return { contents: [{ value: HOVER[w.word] }],
          range: { startLineNumber: pos.lineNumber, endLineNumber: pos.lineNumber,
                   startColumn: w.startColumn, endColumn: w.endColumn } };
      }
    });

    monaco.languages.registerSignatureHelpProvider('lua', {
      signatureHelpTriggerCharacters: ['(', ','],
      provideSignatureHelp(model, pos) {
        const line = model.getLineContent(pos.lineNumber).substring(0, pos.column);
        const match = line.match(/(\w+)\s*\(([^)]*)$/);
        if (!match) return null;
        const SIGS = {
          print:        { label:'print(...)',                params:['...'] },
          pairs:        { label:'pairs(t)',                  params:['t: table'] },
          ipairs:       { label:'ipairs(t)',                 params:['t: table'] },
          type:         { label:'type(v)',                   params:['v: any'] },
          pcall:        { label:'pcall(f, ...)',             params:['f: function','...'] },
          error:        { label:'error(msg, level?)',        params:['message','level?: number'] },
          tostring:     { label:'tostring(v)',               params:['v: any'] },
          tonumber:     { label:'tonumber(e, base?)',        params:['e','base?: number'] },
          setmetatable: { label:'setmetatable(table, mt)',   params:['table','mt: table|nil'] },
          require:      { label:'require(modname)',          params:['modname: string'] },
          rawget:       { label:'rawget(table, index)',      params:['table','index'] },
          rawset:       { label:'rawset(table, index, val)',params:['table','index','value'] },
        };
        const sig = SIGS[match[1]];
        if (!sig) return null;
        const commas = (match[2].match(/,/g) || []).length;
        return { value: {
          signatures: [{ label: sig.label, parameters: sig.params.map(p => ({ label: p })) }],
          activeSignature: 0,
          activeParameter: Math.min(commas, sig.params.length - 1),
        }, dispose() {} };
      }
    });
  }

  /* ─── Tabs ─── */
  function createTab(name) {
    const id = ++tabCounter;
    const label = name || `Script ${id}`;
    const model = window.monaco ? window.monaco.editor.createModel('', 'lua') : null;
    const tab = { id, name: label, model, viewState: null, dirty: false };
    tabs.push(tab);
    renderTabs();
    activateTab(id);
    return tab;
  }

  function closeTab(id, e) {
    if (e) e.stopPropagation();
    const idx = tabs.findIndex(t => t.id === id);
    if (idx === -1) return;
    tabs[idx].model?.dispose();
    tabs.splice(idx, 1);
    if (tabs.length === 0) {
      activeId = null; editor?.setModel(null);
      monacoEl.classList.remove('visible');
      emptyState.classList.remove('hidden');
      sbTab.textContent = '—';
    } else {
      activateTab(tabs[Math.min(idx, tabs.length - 1)].id);
    }
    renderTabs();
  }

  function activateTab(id) {
    if (!editor) return;
    if (activeId !== null) {
      const prev = tabs.find(t => t.id === activeId);
      if (prev) prev.viewState = editor.saveViewState();
    }
    activeId = id;
    const tab = tabs.find(t => t.id === id);
    if (!tab) return;
    if (!tab.model) tab.model = window.monaco.editor.createModel('', 'lua');
    editor.setModel(tab.model);
    if (tab.viewState) editor.restoreViewState(tab.viewState);
    editor.focus();
    tab.dirty = false;
    renderTabs();
    monacoEl.classList.add('visible');
    emptyState.classList.add('hidden');
    sbTab.textContent = tab.name;
    postHost('tabChanged', { tabId: id, tabName: tab.name });
  }

  function renderTabs() {
    tabsRow.innerHTML = '';
    tabs.forEach(tab => {
      const el = document.createElement('div');
      el.className = 'tab' + (tab.id === activeId ? ' active' : '') + (tab.dirty ? ' dirty' : '');
      el.innerHTML = `<span class="tab-dot"></span><span class="tab-label">${esc(tab.name)}</span><span class="tab-close">x</span>`;
      el.addEventListener('click', () => activateTab(tab.id));
      el.addEventListener('dblclick', () => rename(tab, el));
      el.querySelector('.tab-close').addEventListener('click', ev => closeTab(tab.id, ev));
      tabsRow.appendChild(el);
    });
  }

  function rename(tab, el) {
    const span = el.querySelector('.tab-label');
    const inp  = document.createElement('input');
    inp.className = 'tab-name-input';
    inp.value = tab.name;
    span.replaceWith(inp);
    inp.select();
    const done = () => {
      const v = inp.value.trim();
      if (v) { tab.name = v; sbTab.textContent = v; }
      renderTabs();
    };
    inp.addEventListener('blur', done);
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter')  { e.preventDefault(); inp.blur(); }
      if (e.key === 'Escape') inp.blur();
    });
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  window.addEventListener('keydown', e => {
    if (e.ctrlKey && e.key === 't') { e.preventDefault(); createTab(); }
    if (e.ctrlKey && e.key === 'w') { e.preventDefault(); if (activeId !== null) closeTab(activeId); }
  });

  btnNew.addEventListener('click', () => createTab());
})();
</script>
</body>
